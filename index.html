<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmitPro — Admission Test Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
/* ─── YOUR ORIGINAL CSS ────────────────────────────────────────── */
:root {
--primary: #1a3a5c; --primary-light: #2a5a8c; --accent: #e8a020; --accent-light: #f4c060;
--success: #1a8c5a; --danger: #c0392b; --warning: #e67e22; --neutral-50: #f8f9fc;
--neutral-100: #f0f2f7; --neutral-200: #e0e4ef; --neutral-300: #c8cedf; --neutral-500: #8090b0;
--neutral-700: #3a4a6a; --neutral-900: #0e1a2e; --white: #ffffff;
--shadow-sm: 0 2px 8px rgba(26,58,92,0.08); --shadow-md: 0 4px 20px rgba(26,58,92,0.12);
--shadow-lg: 0 8px 40px rgba(26,58,92,0.18); --radius: 12px; --radius-lg: 20px;
}
/* Theme variants */
.theme-emerald { --primary:#0f5132; --primary-light:#198754; --accent:#ffc107; }
.theme-crimson { --primary:#6b1515; --primary-light:#c0392b; --accent:#f39c12; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--neutral-50);color:var(--neutral-900);min-height:100vh;line-height:1.6}
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}
.grid{display:grid}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--neutral-200);overflow:hidden}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.9rem;transition:all .2s;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.form-control{width:100%;padding:10px 14px;border:2px solid var(--neutral-200);border-radius:10px;outline:none}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
.topbar{background:var(--primary);color:#fff;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;padding:12px 0;flex-shrink:0}
.sidebar-item{padding:10px 16px;color:rgba(255,255,255,0.7);cursor:pointer;width:100%;text-align:left;border:none;background:none;font-weight:500}
.sidebar-item.active{background:rgba(255,255,255,0.18);color:#fff;border-left:3px solid var(--accent)}
.admin-content{flex:1;overflow-y:auto;padding:28px}
#firebase-status-bar{position:fixed;bottom:0;left:0;right:0;height:32px;z-index:999;background:var(--neutral-900);color:#fff;font-size:.75rem;display:flex;align-items:center;justify-content:center;gap:12px;transform:translateY(100%);transition:transform .3s}
#firebase-status-bar.show{transform:translateY(0)}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af}
.fb-dot.connected{background:#34d399;box-shadow:0 0 6px #34d399}
.fb-dot.syncing{animation:pulse .8s infinite;background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.badge{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600}
.badge-primary{background:rgba(26,58,92,.1);color:var(--primary)}
</style>
</head>
<body>

<!-- Firebase Status Bar -->
<div id="firebase-status-bar">
<div class="fb-dot" id="fb-dot"></div>
<span id="fb-status-text">Local Mode</span>
<button onclick="openModal('modal-firebase')" style="background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;padding:2px 8px;border-radius:4px">Settings</button>
</div>

<!-- Modal: Firebase Config -->
<div id="modal-firebase" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000">
<div class="card" style="width:90%;max-width:500px;padding:24px">
<h3>🔥 Firebase Multi-Device Sync</h3>
<div class="flex flex-col gap-2 mt-4">
<input type="text" id="fb-apiKey" class="form-control" placeholder="API Key">
<input type="text" id="fb-projectId" class="form-control" placeholder="Project ID">
<input type="text" id="fb-appId" class="form-control" placeholder="App ID">
<input type="text" id="fb-authDomain" class="form-control" placeholder="Auth Domain">
</div>
<div class="flex justify-between mt-4">
<button class="btn" onclick="closeModal('modal-firebase')">Cancel</button>
<button class="btn btn-primary" onclick="connectFirebase()">Save & Connect</button>
</div>
</div>
</div>

<!-- Screen: Landing -->
<div id="screen-landing" class="screen active">
<div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--primary)">
<div class="card" style="width:400px;padding:40px;text-align:center">
<h2 style="font-family:'DM Serif Display'">AdmitPro</h2>
<p style="margin-bottom:24px;color:var(--neutral-500)">Noida Admission Portal</p>
<button class="btn btn-primary w-full" onclick="showScreen('screen-admin')">Enter Admin Dashboard</button>
</div>
</div>
</div>

<!-- Screen: Admin -->
<div id="screen-admin" class="screen">
<div class="topbar">
<div class="flex items-center gap-2"><strong>AdmitPro</strong> <span class="badge badge-primary">Admin</span></div>
<button class="btn" style="color:#fff" onclick="showScreen('screen-landing')">Logout</button>
</div>
<div class="flex" style="flex:1">
<nav class="sidebar">
<button class="sidebar-item active" onclick="changeTab('questions', this)">Questions</button>
<button class="sidebar-item" onclick="changeTab('candidates', this)">Candidates</button>
</nav>
<main class="admin-content">
<div class="flex justify-between items-center mb-4">
<h2 id="tab-title">Question Bank</h2>
<button class="btn btn-primary" id="add-btn" onclick="openAddModal()">+ Add New</button>
</div>
<div id="admin-table-container"></div>
</main>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════════════════════════════
const Store = {
questions: [],
candidates: [],
activeTab: 'questions',

init() {
const saved = localStorage.getItem('admitpro_data');
if(saved) Object.assign(this, JSON.parse(saved));
renderUI();
},

save() {
localStorage.setItem('admitpro_data', JSON.stringify(this));
}
};

// ═══════════════════════════════════════════════════════════════
// FIREBASE ENGINE (MULTI-DEVICE FIX)
// ═══════════════════════════════════════════════════════════════
const FB = {
db: null, app: null, auth: null, listeners: [],

async connect(config) {
try {
if(this.app) await this.app.delete();
this.app = firebase.initializeApp(config, `admitpro_${Date.now()}`);
this.db = this.app.firestore();
this.auth = this.app.auth();

this.setStatus('syncing', 'Connecting to Cloud...');
await this.auth.signInAnonymously();

this.startListeners();
this.setStatus('connected', 'Cloud Sync: Active');
return true;
} catch(e) {
this.setStatus('error', 'Cloud Error');
return false;
}
},

startListeners() {
this.listeners.forEach(unsub => unsub());
['questions', 'candidates'].forEach(col => {
const unsub = this.db.collection(col).onSnapshot(snap => {
Store[col] = snap.docs.map(d => ({id: d.id, ...d.data()}));
renderUI(); // Auto-refresh UI on cloud changes
});
this.listeners.push(unsub);
});
},

setStatus(state, msg) {
const bar = document.getElementById('firebase-status-bar');
const dot = document.getElementById('fb-dot');
document.getElementById('fb-status-text').textContent = msg;
bar.classList.add('show');
dot.className = `fb-dot ${state}`;
}
};

// ═══════════════════════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════════════════════
function renderUI() {
const container = document.getElementById('admin-table-container');
const data = Store[Store.activeTab];

if (Store.activeTab === 'questions') {
container.innerHTML = data.map(q => `
<div class="card" style="padding:16px;margin-bottom:12px;display:flex;justify-content:space-between">
<div>${q.text}</div>
<div class="badge badge-primary">Marks: ${q.marks || 4}</div>
</div>
`).join('') || '<p>No questions found.</p>';
} else {
container.innerHTML = data.map(c => `
<div class="card" style="padding:16px;margin-bottom:12px">
<strong>${c.name}</strong> — Roll: ${c.roll}
</div>
`).join('') || '<p>No candidates found.</p>';
}
}

function changeTab(tab, el) {
Store.activeTab = tab;
document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
el.classList.add('active');
document.getElementById('tab-title').textContent = tab.charAt(0).toUpperCase() + tab.slice(1);
renderUI();
}

function openAddModal() {
const text = prompt(`Enter ${Store.activeTab === 'questions' ? 'Question Text' : 'Candidate Name'}:`);
if(!text) return;

const newItem = Store.activeTab === 'questions'
? { text, marks: 4, id: 'q_' + Date.now() }
: { name: text, roll: 'CAND' + Date.now(), id: 'c_' + Date.now() };

if (FB.db) {
FB.db.collection(Store.activeTab).doc(newItem.id).set(newItem);
} else {
Store[Store.activeTab].push(newItem);
Store.save();
renderUI();
}
}

// Global Helpers
function showScreen(id) {
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

async function connectFirebase() {
const config = {
apiKey: document.getElementById('fb-apiKey').value,
projectId: document.getElementById('fb-projectId').value,
appId: document.getElementById('fb-appId').value,
authDomain: document.getElementById('fb-authDomain').value
};
if(await FB.connect(config)) closeModal('modal-firebase');
}

// Start
Store.init();
</script>
</body>
</html>
