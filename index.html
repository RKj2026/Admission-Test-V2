<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmitPro — Admission Test Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
/* ─── CSS VARIABLES ──────────────────────────────────────────── */
:root {
--primary: #1a3a5c; --primary-light: #2a5a8c; --accent: #e8a020; --accent-light: #f4c060;
--success: #1a8c5a; --danger: #c0392b; --warning: #e67e22; --neutral-50: #f8f9fc;
--neutral-100: #f0f2f7; --neutral-200: #e0e4ef; --neutral-300: #c8cedf;
--neutral-500: #8090b0; --neutral-700: #3a4a6a; --neutral-900: #0e1a2e;
--white: #ffffff; --shadow-sm: 0 2px 8px rgba(26,58,92,0.08);
--shadow-md: 0 4px 20px rgba(26,58,92,0.12); --shadow-lg: 0 8px 40px rgba(26,58,92,0.18);
--radius: 12px; --radius-lg: 20px; transition: all 0.2s;
}
/* Theme variants */
.theme-emerald { --primary:#0f5132; --primary-light:#198754; --accent:#ffc107; }
.theme-crimson { --primary:#6b1515; --primary-light:#c0392b; --accent:#f39c12; }

/* ─── RESET & BASE ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--neutral-50);color:var(--neutral-900);line-height:1.6;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-1{gap:8px}.gap-2{gap:16px}
.grid{display:grid}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--neutral-200);overflow:hidden}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.9rem;transition:all .2s;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-ghost{color:var(--neutral-700);background:transparent}
.form-control{width:100%;padding:10px 14px;border:2px solid var(--neutral-200);border-radius:10px;outline:none}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.topbar{background:var(--primary);color:#fff;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;padding:12px 0;flex-shrink:0;overflow-y:auto}
.sidebar-item{padding:10px 16px;color:rgba(255,255,255,0.7);cursor:pointer;width:100%;text-align:left;border:none;background:none}
.sidebar-item.active{background:rgba(255,255,255,0.18);color:#fff;border-left:3px solid var(--accent)}
.admin-content{flex:1;overflow-y:auto;padding:28px;background:var(--neutral-50)}
#firebase-status-bar{position:fixed;bottom:0;left:0;right:0;height:32px;z-index:999;background:var(--neutral-900);color:#fff;font-size:.75rem;display:flex;align-items:center;justify-content:center;gap:12px;transform:translateY(100%);transition:transform .3s}
#firebase-status-bar.show{transform:translateY(0)}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af}
.fb-dot.connected{background:#34d399;box-shadow:0 0 6px #34d399}
.fb-dot.syncing{animation:pulse .8s infinite;background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div id="firebase-status-bar">
<div class="fb-dot" id="fb-dot"></div>
<span id="fb-status-text">Local Mode</span>
<button onclick="openModal('modal-firebase')" style="background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;padding:2px 8px;border-radius:4px">Configure Firebase</button>
</div>

<div id="toast-container" style="position:fixed;top:20px;right:20px;z-index:10000"></div>

<!-- Modal: Firebase -->
<div id="modal-firebase" class="modal-overlay hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000">
<div class="card" style="width:90%;max-width:500px;padding:24px">
<h3>🔥 Cloud Configuration</h3>
<p style="font-size:0.8rem;color:var(--neutral-500);margin-bottom:16px">Enter details for real-time multi-device sync.</p>
<div class="flex flex-col gap-2">
<input type="text" id="fb-apiKey" class="form-control" placeholder="API Key">
<input type="text" id="fb-projectId" class="form-control" placeholder="Project ID">
<input type="text" id="fb-appId" class="form-control" placeholder="App ID">
<input type="text" id="fb-authDomain" class="form-control" placeholder="Auth Domain">
</div>
<div class="flex justify-between mt-4">
<button class="btn btn-ghost" onclick="closeModal('modal-firebase')">Cancel</button>
<button class="btn btn-primary" onclick="connectFirebase()">Connect</button>
</div>
</div>
</div>

<!-- Screen: Landing -->
<div id="screen-landing" class="screen active">
<div style="flex:1;display:flex;items-center:center;justify-content:center;background:var(--primary)">
<div class="card" style="width:400px;padding:40px;text-align:center;align-self:center">
<h2>AdmitPro</h2>
<p style="margin-bottom:24px;color:var(--neutral-500)">Admission Test Portal</p>
<button class="btn btn-primary w-full" onclick="showScreen('screen-admin')">Admin Login (Demo)</button>
</div>
</div>
</div>

<!-- Screen: Admin -->
<div id="screen-admin" class="screen">
<div class="topbar">
<strong>Dashboard</strong>
<button class="btn btn-ghost" style="color:#fff" onclick="showScreen('screen-landing')">Logout</button>
</div>
<div class="flex" style="flex:1">
<nav class="sidebar">
<button class="sidebar-item active" onclick="renderQuestions()">Questions</button>
<button class="sidebar-item" onclick="renderCandidates()">Candidates</button>
</nav>
<main class="admin-content">
<div id="admin-view" class="card" style="padding:24px">
<p>Sync status: Active. Select a tab.</p>
</div>
</main>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STORE
// ═══════════════════════════════════════════════════════════════
const Store = {
questions: [],
candidates: [],
settings: {},
init() {
const saved = localStorage.getItem('admitpro_data');
if(saved) Object.assign(this, JSON.parse(saved));
},
save() {
localStorage.setItem('admitpro_data', JSON.stringify(this));
if(FB.db) FB.syncAll();
}
};

// ═══════════════════════════════════════════════════════════════
// FIREBASE ENGINE (MULTI-DEVICE FIX)
// ═══════════════════════════════════════════════════════════════
const FB = {
db: null, app: null, auth: null, listeners: [],
async connect(config) {
try {
if(this.app) await this.app.delete();
this.app = firebase.initializeApp(config, `admitpro_${Date.now()}`);
this.db = this.app.firestore();
this.auth = this.app.auth();

this.setStatus('syncing', 'Connecting...');
await this.auth.signInAnonymously();

this.startListeners();
this.setStatus('connected', 'Cloud Sync Live');
return true;
} catch(e) {
this.setStatus('error', 'Failed');
return false;
}
},
startListeners() {
this.listeners.forEach(unsub => unsub());
['questions', 'candidates'].forEach(col => {
const unsub = this.db.collection(col).onSnapshot(snap => {
Store[col] = snap.docs.map(d => ({id: d.id, ...d.data()}));
// Re-render UI on cloud changes
if(col === 'questions') renderQuestions();
if(col === 'candidates') renderCandidates();
});
this.listeners.push(unsub);
});
},
syncAll() {
// Logic for settings sync
},
setStatus(state, msg) {
const bar = document.getElementById('firebase-status-bar');
const dot = document.getElementById('fb-dot');
document.getElementById('fb-status-text').textContent = msg;
bar.classList.add('show');
dot.className = `fb-dot ${state}`;
}
};

// ═══════════════════════════════════════════════════════════════
// UI LOGIC
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

async function connectFirebase() {
const config = {
apiKey: document.getElementById('fb-apiKey').value,
projectId: document.getElementById('fb-projectId').value,
appId: document.getElementById('fb-appId').value,
authDomain: document.getElementById('fb-authDomain').value
};
if(await FB.connect(config)) closeModal('modal-firebase');
}

function renderQuestions() {
const view = document.getElementById('admin-view');
view.innerHTML = `<h3>Questions (${Store.questions.length})</h3>
<button class="btn btn-primary mt-2" onclick="addQuestion()">Add New Question</button>
<ul style="margin-top:20px">${Store.questions.map(q => `<li>${q.text}</li>`).join('')}</ul>`;
}

function renderCandidates() {
const view = document.getElementById('admin-view');
view.innerHTML = `<h3>Candidates (${Store.candidates.length})</h3>
<ul style="margin-top:20px">${Store.candidates.map(c => `<li>${c.name} (${c.roll})</li>`).join('')}</ul>`;
}

function addQuestion() {
const qText = prompt("Enter Question:");
if(!qText) return;
const newQ = { text: qText, timestamp: Date.now() };
if(FB.db) {
FB.db.collection('questions').add(newQ);
} else {
Store.questions.push(newQ);
Store.save();
renderQuestions();
}
}

// Start
Store.init();
</script>
</body>
</html>
