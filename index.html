<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmitPro — Admission Test Platform</title>
<!-- [Rest of your original head section, CSS, and styling remains identical] -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- [Insert your original CSS block here - it is fully compatible] -->

</head>
<body>

<!-- [Your original HTML structure - modals, screens, topbars - remains unchanged] -->

<script>
// ═══════════════════════════════════════════════════════════════
// FIXED DATA STORE
// ═══════════════════════════════════════════════════════════════
const Store = {
settings: {
instituteName: 'AdmitPro Institute', logoText: 'AP', tagline: 'Online Admission Test Portal',
theme: '', tabSwitch: true, rightClick: true, copyBlock: false, fullscreen: false,
maxTabSwitches: 3, showCalc: false, allowReview: true, defMarks: 4, defNeg: 1,
resultsVisible: true,
},
questions: [],
tests: [],
candidates: [],
results: [],

_init() {
const saved = localStorage.getItem('admitpro_data');
if(saved) { try { Object.assign(this, JSON.parse(saved)); } catch(e) {} }
else { this._seed(); }
},

save() {
try {
// Local Save
const dataString = JSON.stringify({
settings:this.settings, questions:this.questions, tests:this.tests,
candidates:this.candidates, results:this.results
});
localStorage.setItem('admitpro_data', dataString);

// Multi-Device Sync: Push to Firestore if connected
if(FB.db) {
FB.syncSettings();
// Array syncing is handled individually in saveQuestion/saveTest etc.
}
} catch(e) { console.error("Save Error", e); }
},
// ... your original _seed() function here ...
};

// ═══════════════════════════════════════════════════════════════
// FIXED FIREBASE MODULE
// ═══════════════════════════════════════════════════════════════
const FB = {
app: null, db: null, auth: null, storage: null,
projectId: null,
_listeners: [],

async connect(config) {
try {
if(this.app) { try { await this.app.delete(); } catch(e){} }
this._stopListeners();

this.app = firebase.initializeApp(config, `admitpro_${Date.now()}`);
this.db = this.app.firestore();
this.auth = this.app.auth();
this.storage = this.app.storage();
this.projectId = config.projectId;

localStorage.setItem('admitpro_fb_config', JSON.stringify(config));
this._setStatus('syncing', 'Connecting to Firebase…');

// SILENT LOGIN (Required for real-time listeners in many Test Modes)
await this.auth.signInAnonymously();

this._setStatus('connected', `Connected · ${config.projectId}`);
this._updateSettingsUI(true, config.projectId);

await this.pullAll();
this.startListeners(); // Start the real-time watchers

return true;
} catch(err) {
this._setStatus('error', 'Connection failed: ' + err.message);
return false;
}
},

startListeners() {
if(!this.db) return;
this._stopListeners();

const collections = ['questions','tests','candidates','results'];
collections.forEach(col => {
const unsub = this.db.collection(col).onSnapshot(snap => {
if (snap.metadata.hasPendingWrites) return; // Don't trigger for our own local saves

const data = snap.docs.map(d=>({id:d.id,...d.data()}));
if(col==='questions') Store.questions = data;
if(col==='tests') Store.tests = data;
if(col==='candidates')Store.candidates= data;
if(col==='results') Store.results = data;

// Auto-update UI without refreshing the page
const ap = document.querySelector('.admin-page.active');
if(ap) {
const pid = ap.id.replace('page-','');
const renders = {
questions: renderQuestions,
tests: renderTests,
candidates: renderCandidates,
results: renderResults,
dashboard: renderDashboard
};
if(renders[pid]) renders[pid]();
}
updateSidebarCounts();
});
this._listeners.push(unsub);
});

const sUnsub = this.db.collection('settings').doc('main').onSnapshot(snap => {
if(snap.exists) {
Object.assign(Store.settings, snap.data());
applyBranding();
}
});
this._listeners.push(sUnsub);
},

_stopListeners() {
this._listeners.forEach(u => u());
this._listeners = [];
},

// These push your specific data to the cloud
syncQuestion(q) { if(this.db) this.db.collection('questions').doc(q.id).set(q); },
syncTest(t) { if(this.db) this.db.collection('tests').doc(t.id).set(t); },
syncCandidate(c) { if(this.db) this.db.collection('candidates').doc(c.id).set(c); },
syncResult(r) { if(this.db) this.db.collection('results').doc(r.id).set(r); },
syncSettings() { if(this.db) this.db.collection('settings').doc('main').set(Store.settings); },

// ... rest of your original FB helper functions ...
};

// [Keep all your original UI rendering functions: renderDashboard, renderQuestions, etc.]
// [Ensure any function that modifies data calls Store.save() or FB.syncXXX()]

init();
</script>
</body>
</html>
