<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmitPro - Admission Test Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
/* ─── CSS VARIABLES ──────────────────────────────────────────── */
:root {
  --primary: #1a3a5c;
  --primary-light: #2a5a8c;
  --accent: #e8a020;
  --accent-light: #f4c060;
  --success: #1a8c5a;
  --danger: #c0392b;
  --warning: #e67e22;
  --neutral-50: #f8f9fc;
  --neutral-100: #f0f2f7;
  --neutral-200: #e0e4ef;
  --neutral-300: #c8cedf;
  --neutral-500: #8090b0;
  --neutral-700: #3a4a6a;
  --neutral-900: #0e1a2e;
  --white: #ffffff;
  --shadow-sm: 0 2px 8px rgba(26,58,92,0.08);
  --shadow-md: 0 4px 20px rgba(26,58,92,0.12);
  --shadow-lg: 0 8px 40px rgba(26,58,92,0.18);
  --radius: 12px;
  --radius-lg: 20px;
  transition: all 0.2s;
}

/* Theme variants */
.theme-emerald  { --primary:#0f5132; --primary-light:#198754; --accent:#ffc107; }
.theme-crimson  { --primary:#6b1515; --primary-light:#c0392b; --accent:#f39c12; }
.theme-violet   { --primary:#2d1b69; --primary-light:#6f42c1; --accent:#fd7e14; }
.theme-slate    { --primary:#1e293b; --primary-light:#475569; --accent:#38bdf8; }

/* RESET & BASE */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--neutral-50);color:var(--neutral-900);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
.hidden{display:none!important}

/* UTILITIES */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}
.grid{display:grid}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
.gap-1{gap:8px}.gap-2{gap:16px}.gap-3{gap:24px}
.p-2{padding:16px}.p-3{padding:24px}.mb-2{margin-bottom:16px}.mt-2{margin-top:16px}
.rounded-lg{border-radius:var(--radius)}

/* SCREENS */
.screen{display:none;min-height:100vh;animation:fadeIn .3s ease}
.screen.active{display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--primary);color:var(--white);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.logo-badge{width:40px;height:40px;border-radius:10px;background:var(--accent);color:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-weight:700}

/* ADMIN LAYOUT */
.admin-layout{display:flex;flex:1;min-height:0}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;padding:12px 0;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 16px;color:rgba(255,255,255,.7);transition:all .2s;width:100%;text-align:left}
.sidebar-item:hover, .sidebar-item.active{background:rgba(255,255,255,.1);color:#fff}
.sidebar-item.active{border-left:4px solid var(--accent)}
.admin-content{flex:1;overflow-y:auto;padding:28px;background:var(--neutral-50)}
.admin-page{display:none}
.admin-page.active{display:block}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light)}
.btn-lg{padding:14px 28px;width:100%}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--neutral-200);overflow:hidden;margin-bottom:20px}
.stat-card{padding:20px;background:#fff;border-radius:12px;border:1px solid #eee}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--neutral-200);margin-bottom:24px}
.tab-btn{padding:10px 20px;color:var(--neutral-500);border-bottom:2px solid transparent}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div id="toast-container"></div>

<!-- SCREEN: LANDING -->
<div id="screen-landing" class="screen active">
  <div style="flex:1; display:flex; align-items:center; justify-content:center; background:var(--primary)">
    <div class="card p-3" style="width:100%; max-width:400px">
      <div style="text-align:center; margin-bottom:20px">
        <div class="logo-badge" style="margin:0 auto 10px; width:60px; height:60px; font-size:1.5rem">AP</div>
        <h2 style="font-family:'DM Serif Display'">AdmitPro Institute</h2>
      </div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchLoginTab('candidate')">Candidate</button>
        <button class="tab-btn" onclick="switchLoginTab('admin')">Admin</button>
      </div>
      <div id="login-admin" class="hidden">
        <input type="email" id="admin-email" placeholder="Admin Email" value="admin@admitpro.com" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px">
        <input type="password" id="admin-pass" placeholder="Password" value="admin123" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px">
        <button class="btn btn-primary btn-lg" onclick="loginAdmin()">Admin Login</button>
      </div>
      <div id="login-candidate">
        <input type="text" id="login-roll" placeholder="Roll Number" value="CAND001" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px">
        <input type="password" id="login-dob" placeholder="Password" value="test123" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px">
        <button class="btn btn-primary btn-lg">Candidate Login</button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: ADMIN -->
<div id="screen-admin" class="screen">
  <div class="topbar">
    <div style="display:flex; align-items:center; gap:10px">
      <div class="logo-badge">AP</div>
      <span style="font-weight:bold">Admin Panel</span>
    </div>
    <button class="btn" style="color:#fff" onclick="showScreen('screen-landing')">Logout</button>
  </div>
  <div class="admin-layout">
    <nav class="sidebar">
      <button class="sidebar-item active" onclick="showAdminPage('dashboard', this)">📊 Dashboard</button>
      <button class="sidebar-item" onclick="showAdminPage('questions', this)">❓ Questions</button>
      <button class="sidebar-item" onclick="showAdminPage('tests', this)">📋 Tests</button>
      <button class="sidebar-item" onclick="showAdminPage('candidates', this)">👥 Candidates</button>
      <button class="sidebar-item" onclick="showAdminPage('settings', this)">⚙️ Settings</button>
    </nav>
    <main class="admin-content">
      <div id="page-dashboard" class="admin-page active">
        <h2>Dashboard</h2>
        <div class="grid grid-4 gap-2 mt-2" id="dashboard-stats">
            <div class="stat-card"><h3>Loading...</h3></div>
        </div>
      </div>
      <div id="page-questions" class="admin-page">
        <h2>Question Bank</h2>
        <div class="card p-2 mt-2">Questions List Here</div>
      </div>
      <div id="page-tests" class="admin-page">
        <h2>Tests</h2>
        <div class="card p-2 mt-2">Tests Management Here</div>
      </div>
      <div id="page-candidates" class="admin-page">
        <h2>Candidates</h2>
        <div class="card p-2 mt-2">Candidates List Here</div>
      </div>
      <div id="page-settings" class="admin-page">
        <h2>Settings</h2>
        <div class="card p-2 mt-2">Branding and Configuration</div>
      </div>
    </main>
  </div>
</div>

<script>
// DATA STORE
const Store = {
  settings: { instituteName: 'AdmitPro Institute', logoText: 'AP' },
  questions: [], tests: [], candidates: [], results: [],
  _init() {
    const saved = localStorage.getItem('admitpro_data');
    if(saved) { try { Object.assign(this, JSON.parse(saved)); } catch(e) {} }
    _ensureDemoCandidate();
  },
  save() {
    localStorage.setItem('admitpro_data', JSON.stringify(this));
  }
};

// APP LOGIC
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/** 
 * TAB NAVIGATION FIX:
 * Correctly hides and shows admin pages and manages button active states.
 */
function showAdminPage(page, btn) {
  // 1. Hide all pages
  document.querySelectorAll('.admin-page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none'; // Ensure hidden
  });

  // 2. Clear all sidebar button states
  document.querySelectorAll('.sidebar-item').forEach(b => {
    b.classList.remove('active');
  });

  // 3. Show selected page
  const target = document.getElementById('page-' + page);
  if(target) {
    target.classList.add('active');
    target.style.display = 'block'; // Ensure visible
  }

  // 4. Set button state
  if(btn) btn.classList.add('active');

  // 5. Run page renders
  if(page === 'dashboard') renderDashboard();
}

function switchLoginTab(tab) {
  const isCandidate = tab === 'candidate';
  document.getElementById('login-candidate').classList.toggle('hidden', !isCandidate);
  document.getElementById('login-admin').classList.toggle('hidden', isCandidate);
  
  // Tab UI toggle
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.innerText.toLowerCase() === tab);
  });
}

function loginAdmin() {
  const email = document.getElementById('admin-email').value;
  const pass = document.getElementById('admin-pass').value;
  if(email === 'admin@admitpro.com' && pass === 'admin123') {
    showScreen('screen-admin');
    renderDashboard();
    toast('Welcome back!', 'success');
  } else {
    toast('Invalid Credentials', 'danger');
  }
}

function renderDashboard() {
  const stats = [
    { label: 'Questions', val: Store.questions.length },
    { label: 'Tests', val: Store.tests.length },
    { label: 'Candidates', val: Store.candidates.length },
    { label: 'Results', val: Store.results.length }
  ];
  document.getElementById('dashboard-stats').innerHTML = stats.map(s => `
    <div class="stat-card">
      <div style="font-size:1.5rem; font-weight:bold; color:var(--primary)">${s.val}</div>
      <div style="color:var(--neutral-500)">${s.label}</div>
    </div>
  `).join('');
}

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.style.cssText = "position:fixed; top:20px; right:20px; background:#333; color:#fff; padding:12px 20px; border-radius:8px; z-index:10000; animation:slideUp .3s ease";
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function _ensureDemoCandidate() {
  if(!Store.candidates.some(c => c.roll === 'CAND001')) {
    Store.candidates.push({id: 'C1', roll: 'CAND001', password: 'test123'});
  }
}

function init() {
  Store._init();
  showScreen('screen-landing');
}

// Fixed Syntax error here: timeLeft-- (two dashes)
let timer;
function startTimer(duration) {
  let timeLeft = duration;
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--; 
    if(timeLeft <= 0) clearInterval(timer);
  }, 1000);
}

// Start
init();
</script>
</body>
</html>
