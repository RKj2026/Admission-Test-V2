<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdmitPro — Admission Test Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

<!-- Firebase v10 compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
/* ─── CSS VARIABLES & THEMES ────────────────────────────────── */
:root {
--primary: #1a3a5c; --primary-light: #2a5a8c; --accent: #e8a020; --accent-light: #f4c060;
--success: #1a8c5a; --danger: #c0392b; --warning: #e67e22; --neutral-50: #f8f9fc;
--neutral-100: #f0f2f7; --neutral-200: #e0e4ef; --neutral-300: #c8cedf; --neutral-500: #8090b0;
--neutral-700: #3a4a6a; --neutral-900: #0e1a2e; --white: #ffffff;
--shadow-sm: 0 2px 8px rgba(26,58,92,0.08); --shadow-md: 0 4px 20px rgba(26,58,92,0.12);
--shadow-lg: 0 8px 40px rgba(26,58,92,0.18); --radius: 12px; --radius-lg: 20px;
}
/* Theme variants */
.theme-emerald { --primary:#0f5132; --primary-light:#198754; --accent:#ffc107; }
.theme-crimson { --primary:#6b1515; --primary-light:#c0392b; --accent:#f39c12; }
.theme-custom { /* JS populated */ }

/* ─── RESET & BASE ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--neutral-50);color:var(--neutral-900);line-height:1.6;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:16px}
.grid{display:grid}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--neutral-200);overflow:hidden}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:10px;font-weight:600;transition:all .2s;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-ghost{background:transparent;color:var(--neutral-700)}
.form-control{width:100%;padding:10px 14px;border:2px solid var(--neutral-200);border-radius:10px;outline:none}

/* ─── SCREENS ────────────────────────────────────────────────── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.topbar{background:var(--primary);color:#fff;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.sidebar{width:240px;background:var(--primary);color:#fff;display:flex;flex-direction:column;padding:12px 0;flex-shrink:0}
.admin-content{flex:1;padding:28px;background:var(--neutral-50);overflow-y:auto}

/* ─── STATUS BAR ────────────────────────────────────────────── */
#firebase-status-bar{position:fixed;bottom:0;left:0;right:0;height:32px;z-index:999;background:var(--neutral-900);color:#fff;font-size:.75rem;display:flex;align-items:center;justify-content:center;gap:12px;transform:translateY(100%);transition:transform .3s}
#firebase-status-bar.show{transform:translateY(0)}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af}
.fb-dot.connected{background:#34d399;box-shadow:0 0 6px #34d399}
.fb-dot.syncing{animation:pulse .8s infinite;background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div id="firebase-status-bar">
<div class="fb-dot" id="fb-dot"></div>
<span id="fb-status-text">Local Mode</span>
<button onclick="openModal('modal-firebase')" style="background:rgba(255,255,255,.1);border:none;color:#fff;cursor:pointer;padding:2px 8px;border-radius:4px">Config</button>
</div>

<!-- ─── MODAL: FIREBASE CONFIG ────────────────────────────────── -->
<div id="modal-firebase" class="modal-overlay hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000">
<div class="card" style="width:90%;max-width:500px;padding:24px">
<h3 style="margin-bottom:16px">🔥 Firebase Sync Setup</h3>
<div class="flex flex-col gap-2">
<input type="text" id="fb-apiKey" class="form-control" placeholder="API Key">
<input type="text" id="fb-projectId" class="form-control" placeholder="Project ID">
<input type="text" id="fb-appId" class="form-control" placeholder="App ID">
<input type="text" id="fb-authDomain" class="form-control" placeholder="Auth Domain">
</div>
<div id="fb-sync-actions" class="hidden" style="margin-top:16px;padding:12px;background:#fff9e6;border-radius:8px">
<p style="font-size:0.8rem;margin-bottom:8px">Connected! Would you like to upload your local data to the cloud?</p>
<button class="btn btn-primary" onclick="FB.pushLocalData()" style="font-size:0.8rem">Upload Local Data</button>
</div>
<div class="flex justify-between mt-4">
<button class="btn btn-ghost" onclick="closeModal('modal-firebase')">Cancel</button>
<button class="btn btn-primary" onclick="connectFirebase()">Connect & Sync</button>
</div>
</div>
</div>

<!-- ─── MAIN APP SCREENS ──────────────────────────────────────── -->
<div id="screen-landing" class="screen active">
<div style="flex:1;display:flex;align-items:center;justify-content:center">
<div class="card" style="width:400px;padding:32px;text-align:center">
<h2>AdmitPro</h2>
<p style="color:var(--neutral-500);margin-bottom:24px">Admission Test Portal</p>
<button class="btn btn-primary w-full" onclick="loginAdmin()">Login as Admin</button>
</div>
</div>
</div>

<div id="screen-admin" class="screen">
<div class="topbar">
<div class="flex items-center"><strong>AdmitPro Admin</strong></div>
<button class="btn btn-ghost" style="color:#fff" onclick="showScreen('screen-landing')">Logout</button>
</div>
<div class="flex" style="flex:1">
<nav class="sidebar">
<div style="padding:16px;font-size:0.8rem;opacity:0.6">DASHBOARD</div>
<button class="btn btn-ghost" style="color:#fff;justify-content:flex-start" onclick="renderQuestions()">Questions</button>
<button class="btn btn-ghost" style="color:#fff;justify-content:flex-start" onclick="renderCandidates()">Candidates</button>
</nav>
<main class="admin-content" id="admin-main">
<div id="view-default">
<h3>Welcome</h3>
<p>Select a module from the sidebar to begin syncing data across devices.</p>
</div>
<div id="view-table"></div>
</main>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// GLOBAL STORE & LOCAL SYNC
// ═══════════════════════════════════════════════════════════════
const Store = {
questions: [],
candidates: [],
settings: { instituteName: 'AdmitPro' },

init() {
const saved = localStorage.getItem('admitpro_data');
if(saved) Object.assign(this, JSON.parse(saved));
},

save() {
localStorage.setItem('admitpro_data', JSON.stringify(this));
if(FB.db) FB.syncAll();
}
};

// ═══════════════════════════════════════════════════════════════
// FIREBASE ENGINE (MULTI-DEVICE CORE)
// ═══════════════════════════════════════════════════════════════
const FB = {
db: null, app: null, auth: null,
listeners: [],

async connect(config) {
try {
this.app = firebase.initializeApp(config, `admitpro_${Date.now()}`);
this.db = this.app.firestore();
this.auth = this.app.auth();

this.setStatus('syncing', 'Connecting to Cloud...');

// TEST MODE FIX: Silent login for persistence
await this.auth.signInAnonymously();

this.startListeners();
this.setStatus('connected', 'Cloud Sync Active');
document.getElementById('fb-sync-actions').classList.remove('hidden');
return true;
} catch(e) {
console.error(e);
this.setStatus('error', 'Connection Failed');
return false;
}
},

startListeners() {
const collections = ['questions', 'candidates'];
collections.forEach(col => {
const unsub = this.db.collection(col).onSnapshot(snap => {
const data = snap.docs.map(d => ({id: d.id, ...d.data()}));
Store[col] = data;

// Auto-refresh whichever UI is currently visible
if(col === 'questions') renderQuestions();
if(col === 'candidates') renderCandidates();

console.log(`📡 Cloud Update: ${col} synced`);
});
this.listeners.push(unsub);
});
},

syncAll() {
// Only used for manual full-sync or settings
this.db.collection('settings').doc('main').set(Store.settings);
},

async pushLocalData() {
this.setStatus('syncing', 'Uploading Local Data...');
const batch = this.db.batch();

Store.questions.forEach(q => batch.set(this.db.collection('questions').doc(q.id || `q_${Date.now()}`), q));
Store.candidates.forEach(c => batch.set(this.db.collection('candidates').doc(c.id || `c_${Date.now()}`), c));

await batch.commit();
this.setStatus('connected', 'Data Uploaded!');
},

setStatus(state, msg) {
const bar = document.getElementById('firebase-status-bar');
const dot = document.getElementById('fb-dot');
document.getElementById('fb-status-text').textContent = msg;
bar.classList.add('show');
dot.className = `fb-dot ${state}`;
}
};

// ═══════════════════════════════════════════════════════════════
// UI & ACTIONS
// ═══════════════════════════════════════════════════════════════
function showScreen(id) {
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

async function connectFirebase() {
const config = {
apiKey: document.getElementById('fb-apiKey').value,
projectId: document.getElementById('fb-projectId').value,
appId: document.getElementById('fb-appId').value,
authDomain: document.getElementById('fb-authDomain').value
};
await FB.connect(config);
}

function loginAdmin() { showScreen('screen-admin'); }

function renderQuestions() {
const container = document.getElementById('view-table');
container.innerHTML = `<h3>Questions (${Store.questions.length})</h3>
<button class="btn btn-primary" onclick="addDummyQuestion()">+ Add Sync Question</button>
<div style="margin-top:16px">${Store.questions.map(q => `<div class="card" style="padding:12px;margin-bottom:8px">${q.text}</div>`).join('')}</div>`;
}

function renderCandidates() {
const container = document.getElementById('view-table');
container.innerHTML = `<h3>Candidates (${Store.candidates.length})</h3>
<div style="margin-top:16px">${Store.candidates.map(c => `<div class="card" style="padding:12px;margin-bottom:8px">${c.name} - ${c.roll}</div>`).join('')}</div>`;
}

function addDummyQuestion() {
const newQ = { id: `q_${Date.now()}`, text: `New Question at ${new Date().toLocaleTimeString()}` };
if(FB.db) {
FB.db.collection('questions').doc(newQ.id).set(newQ);
} else {
Store.questions.push(newQ);
Store.save();
renderQuestions();
}
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
Store.init();
</script>
</body>
</html>
